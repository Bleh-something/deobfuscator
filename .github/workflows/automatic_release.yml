# Builds the deobfuscator and publishes a rolling "latest" release on every push to master.
name: Build and Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build with a modern JDK; the pom still targets Java 8 bytecode, so the jar
      # runs on JDK 8+ (JDK 8 is only needed at runtime for the VM-based ZKM string
      # transformers — see README).
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B -DskipTests package --file pom.xml

      - name: Rename artifact
        run: mv target/deobfuscator-*.jar target/deobfuscator.jar

      # Refresh the rolling tag so "latest" always points at the newest build.
      - name: Reset 'latest' release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --cleanup-tag --yes || true

      - name: Publish 'latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Latest Build
          prerelease: false
          body: |
            Automated build of the latest commit on `master`.

            Run with `java -jar deobfuscator.jar --config config.yml`.
            The VM-based Zelix `Simple`/`Enhanced` string transformers require a **JDK 8** runtime; everything else runs on any modern JDK. See the README for details.
          files: |
            target/deobfuscator.jar
            LICENSE
